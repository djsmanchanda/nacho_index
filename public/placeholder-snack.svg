<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" fill="none">
  <defs>
    <!-- Gradients -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lines" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.8"/>
    </linearGradient>
    
    <!-- Animations -->
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.3; transform: scale(0.98); }
        50% { opacity: 0.6; transform: scale(1.02); }
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes radar-scan {
        0% { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: 40; }
      }
      .pulsing-glow {
        animation: pulse 4s ease-in-out infinite;
        transform-origin: center;
      }
      .spinning-ring {
        animation: spin 20s linear infinite;
        transform-origin: center;
      }
      .spinning-ring-reverse {
        animation: spin 15s linear infinite reverse;
        transform-origin: center;
      }
      .scanning-radar {
        stroke-dasharray: 8 4;
        animation: radar-scan 2s linear infinite;
      }
      .cyber-text {
        font-family: var(--font-geist-mono), 'Courier New', monospace;
        font-size: 10px;
        fill: #f97316;
        opacity: 0.85;
        letter-spacing: 1px;
      }
    </style>
  </defs>

  <!-- Background base -->
  <rect width="400" height="400" fill="#030303"/>
  <rect width="400" height="400" fill="url(#glow)" class="pulsing-glow"/>

  <!-- Technical Grid -->
  <g opacity="0.07" stroke="#fb923c" stroke-width="1">
    <line x1="40" y1="0" x2="40" y2="400"/>
    <line x1="80" y1="0" x2="80" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="280" y1="0" x2="280" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    
    <line x1="0" y1="40" x2="400" y2="40"/>
    <line x1="0" y1="80" x2="400" y2="80"/>
    <line x1="0" y1="120" x2="400" y2="120"/>
    <line x1="0" y1="160" x2="400" y2="160"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="240" x2="400" y2="240"/>
    <line x1="0" y1="280" x2="400" y2="280"/>
    <line x1="0" y1="320" x2="400" y2="320"/>
    <line x1="0" y1="360" x2="400" y2="360"/>
  </g>

  <!-- Cybernetic Rings -->
  <circle cx="200" cy="200" r="140" stroke="url(#lines)" stroke-width="1.5" stroke-opacity="0.15"/>
  <circle cx="200" cy="200" r="120" stroke="url(#lines)" stroke-width="2" stroke-opacity="0.4" class="spinning-ring scanning-radar"/>
  <circle cx="200" cy="200" r="100" stroke="#fbbf24" stroke-width="1.5" stroke-opacity="0.25" stroke-dasharray="10 8" class="spinning-ring-reverse"/>
  <circle cx="200" cy="200" r="70" stroke="#f97316" stroke-width="1" stroke-opacity="0.1" stroke-dasharray="2 4"/>

  <!-- Holographic Snack Specimen (Abstract Tortilla Chip Shape) -->
  <g class="pulsing-glow">
    <path d="M 200 130 L 270 250 L 130 250 Z" fill="none" stroke="url(#lines)" stroke-width="3" stroke-linejoin="round" stroke-linecap="round" filter="drop-shadow(0px 0px 8px rgba(249, 115, 22, 0.5))"/>
    <circle cx="200" cy="180" r="4" fill="#fbbf24" opacity="0.8"/>
    <circle cx="170" cy="220" r="3" fill="#f97316" opacity="0.6"/>
    <circle cx="230" cy="210" r="3" fill="#ef4444" opacity="0.7"/>
  </g>

  <!-- Crosshairs -->
  <path d="M 200 45 L 200 70 M 200 330 L 200 355 M 45 200 L 70 200 M 330 200 L 355 200" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.5"/>
  
  <!-- Cybernetic HUD Readouts -->
  <text x="50" y="70" class="cyber-text">SYS: ACTIVE</text>
  <text x="50" y="85" class="cyber-text">INDEX: 0.1.0</text>
  
  <text x="350" y="70" class="cyber-text" text-anchor="end">SCAN: PENDING</text>
  <text x="350" y="85" class="cyber-text" text-anchor="end">RESONANCE: OK</text>
  
  <!-- Center Readout -->
  <rect x="120" y="275" width="160" height="28" rx="6" fill="#080808" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="200" y="293" text-anchor="middle" fill="#fafafa" font-family="system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="0.5px">SPECIMEN ANALYZING</text>
  
  <!-- Sub-border markers -->
  <path d="M 15 15 L 35 15 M 15 15 L 15 35 M 385 15 L 365 15 M 385 15 L 385 35 M 15 385 L 35 385 M 15 385 L 15 365 M 385 385 L 365 385 M 385 385 L 385 365" stroke="#f97316" stroke-width="2" stroke-opacity="0.8"/>
</svg>
